<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0F1115; }
        .card { background-color: #1A1D23; }
        input { background-color: #0F1115 !important; border-color: rgba(201, 161, 74, 0.2) !important; }
    </style>
</head>
<body style="background-color: #0F1115; color: #F5F5F5;">
<div class="mx-auto max-w-6xl px-6 py-10">
    <div class="mb-8 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <div>
            <h1 class="text-3xl font-black" style="color: #C9A14A;">Admin Dashboard</h1>
            <p style="color: #A8A8A8;">Payment Management Controls</p>
        </div>
        <div class="flex gap-2">
            <a href="/admin/payments" class="rounded-lg px-4 py-2 text-sm" style="border: 1px solid rgba(201, 161, 74, 0.3); background-color: #1A1D23; color: #F5F5F5;">Manage Payments</a>
            <a href="/logout" class="rounded-lg px-4 py-2 text-sm font-semibold" style="background-color: #C9A14A; color: #0F1115;">Logout</a>
        </div>
    </div>

    <div class="grid gap-5 md:grid-cols-4">
        <div class="rounded-2xl p-5 md:col-span-2" style="background-color: #1A1D23; border: 2px solid rgba(201, 161, 74, 0.3);">
            <p style="color: #A8A8A8;">Total Revenue (Completed)</p>
            <p class="mt-2 text-4xl font-black" style="color: #C9A14A;" th:text="${#numbers.formatDecimal(totalRevenue, 1, 'COMMA', 2, 'POINT')}"></p>
        </div>
        <div class="rounded-2xl p-5" style="background-color: #1A1D23; border: 2px solid rgba(201, 161, 74, 0.2);">
            <p style="color: #A8A8A8;">Pending</p>
            <p class="mt-2 text-3xl font-black" style="color: #C9A14A;" th:text="${pendingCount}"></p>
        </div>
        <div class="rounded-2xl p-5" style="background-color: #1A1D23; border: 2px solid rgba(201, 161, 74, 0.2);">
            <p style="color: #A8A8A8;">Completed</p>
            <p class="mt-2 text-3xl font-black" style="color: #C9A14A;" th:text="${completedCount}"></p>
        </div>
        <div class="rounded-2xl p-5" style="background-color: #1A1D23; border: 2px solid rgba(201, 161, 74, 0.2);">
            <p style="color: #A8A8A8;">Failed</p>
            <p class="mt-2 text-3xl font-black" style="color: #C9A14A;" th:text="${failedCount}"></p>
        </div>
    </div>
</div>
</body>
</html>
