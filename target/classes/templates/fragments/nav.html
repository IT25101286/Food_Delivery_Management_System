<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<body>
<nav th:fragment="nav" class="bg-slate-900/60 backdrop-blur-sm border border-blue-500/20 rounded-2xl px-5 py-4 mb-6">
    <div class="flex items-center justify-between flex-wrap gap-3">

        <a th:href="@{/admin/dashboard}" class="flex items-center">
            <div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-blue-600 rounded-xl flex items-center justify-center mr-3 shadow-lg shadow-blue-500/25">
                <span class="text-white font-bold text-sm">FD</span>
            </div>
            <div>
                <span class="font-bold bg-gradient-to-r from-blue-300 to-blue-600 bg-clip-text text-transparent">FoodDelivery</span>
                <span class="text-slate-400 text-sm ml-1">Admin</span>
            </div>
        </a>

        <div class="flex items-center gap-1">
            <a th:href="@{/admin/dashboard}"
               class="text-slate-300 hover:text-cyan-300 hover:bg-slate-800/60 px-3 py-2 rounded-lg text-sm font-medium transition-all">
                Dashboard
            </a>
            <a th:href="@{/admin/admins}"
               sec:authorize="hasRole('SUPER_ADMIN')"
               class="text-slate-300 hover:text-cyan-300 hover:bg-slate-800/60 px-3 py-2 rounded-lg text-sm font-medium transition-all">
                Admins
            </a>
        </div>

        <div class="flex items-center gap-3">
            <div class="text-right hidden sm:block">
                <p class="text-slate-300 text-sm font-medium" sec:authentication="name">User</p>
                <p class="text-slate-500 text-xs"
                   sec:authentication="principal.authorities">Role</p>
            </div>
            <form th:action="@{/logout}" method="post">
                <button type="submit"
                        class="bg-blue-500 hover:bg-blue-600 text-white text-sm font-medium px-4 py-2 rounded-xl transition-colors shadow-lg shadow-blue-500/20">
                    Logout
                </button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
