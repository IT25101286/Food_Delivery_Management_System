<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Register - FoodDelivery</title>
<script src="https://cdn.tailwindcss.com"></script><script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        slate: {
          300: '#A8A8A8',
          400: '#A8A8A8',
          600: 'rgba(255,255,255,0.08)',
          800: 'rgba(255,255,255,0.05)',
          900: '#1A1D23',
          950: '#0F1115'
        },
        blue: {
          400: '#C9A14A',
          500: '#C9A14A',
          600: '#A9863A',
          950: '#0F1115'
        },
        cyan: {
          300: '#C9A14A',
          400: '#C9A14A',
          950: '#0F1115'
        },
        white: '#F5F5F5'
      }
    }
  }
}
</script>
<style>
  .border-blue-500\/20, .border-slate-800, .border-slate-600, .border-b {
    border-color: rgba(255, 255, 255, 0.08) !important;
  }
  .bg-slate-900\/60, .bg-slate-900\/80 {
    background-color: #1A1D23 !important;
  }
  .bg-slate-800 {
    background-color: rgba(255, 255, 255, 0.05) !important;
  }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-950 via-slate-950 to-cyan-950 flex flex-col">
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="flex-1 flex items-center justify-center p-4">
<div class="w-full max-w-md">
  <div class="bg-slate-900/60 border border-blue-500/20 rounded-2xl p-8">
    <div class="text-center mb-8">
      <span class="bg-gradient-to-r from-blue-500 to-cyan-400 text-white font-bold px-4 py-2 rounded-xl text-2xl">FD</span>
      <h1 class="text-white text-2xl font-bold mt-4">Create Account</h1>
    </div>
    <div th:if="${error}" class="bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl p-3 mb-4 text-sm" th:text="${error}"></div>
    <form action="/register" method="post" class="space-y-4">
      <div><label class="text-slate-300 text-sm block mb-1">Full Name</label>
        <input type="text" name="name" required class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none text-sm"></div>
      <div><label class="text-slate-300 text-sm block mb-1">Email</label>
        <input type="email" name="email" required class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none text-sm"></div>
      <div><label class="text-slate-300 text-sm block mb-1">Phone</label>
        <input type="text" name="phone" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none text-sm"></div>
      <div><label class="text-slate-300 text-sm block mb-1">Password</label>
        <input type="password" name="password" required class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none text-sm"></div>
      <button class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2.5 rounded-xl font-semibold transition">Create Account</button>
    </form>
    <p class="text-center text-slate-400 text-sm mt-4">Already have an account? <a href="/login" class="text-cyan-300 hover:underline">Login</a></p>
  </div>
</div>
</div>
</body></html>
