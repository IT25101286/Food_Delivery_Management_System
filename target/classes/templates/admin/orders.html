<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Orders - Admin</title>
<script src="https://cdn.tailwindcss.com"></script><script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        slate: {
          300: '#A8A8A8',
          400: '#A8A8A8',
          600: 'rgba(255,255,255,0.08)',
          800: 'rgba(255,255,255,0.05)',
          900: '#1A1D23',
          950: '#0F1115'
        },
        blue: {
          400: '#C9A14A',
          500: '#C9A14A',
          600: '#A9863A',
          950: '#0F1115'
        },
        cyan: {
          300: '#C9A14A',
          400: '#C9A14A',
          950: '#0F1115'
        },
        white: '#F5F5F5'
      }
    }
  }
}
</script>
<style>
  .border-blue-500\/20, .border-slate-800, .border-slate-600, .border-b {
    border-color: rgba(255, 255, 255, 0.08) !important;
  }
  .bg-slate-900\/60, .bg-slate-900\/80 {
    background-color: #1A1D23 !important;
  }
  .bg-slate-800 {
    background-color: rgba(255, 255, 255, 0.05) !important;
  }
  select, select option {
    background-color: #1A1D23;
    color: #F5F5F5;
  }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-950 via-slate-950 to-cyan-950">
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="max-w-7xl mx-auto px-4 py-10">
  <h1 class="text-3xl font-bold text-white mb-8">All Orders</h1>
  <div class="bg-slate-900/60 border border-blue-500/20 rounded-2xl overflow-hidden">
    <table class="w-full text-sm">
      <thead><tr class="border-b border-blue-500/20">
        <th class="text-left text-slate-400 px-4 py-3">Ref</th>
        <th class="text-left text-slate-400 px-4 py-3">Customer</th>
        <th class="text-left text-slate-400 px-4 py-3">Items</th>
        <th class="text-left text-slate-400 px-4 py-3">Amount</th>
        <th class="text-left text-slate-400 px-4 py-3">Status</th>
        <th class="text-left text-slate-400 px-4 py-3">Update</th>
      </tr></thead>
      <tbody>
        <tr th:each="o : ${orders}" class="border-b border-slate-800 hover:bg-slate-800/30">
          <td class="px-4 py-3 text-cyan-300 font-mono" th:text="${o.orderRef}"></td>
          <td class="px-4 py-3 text-slate-300" th:text="${o.customerName}"></td>
          <td class="px-4 py-3 text-slate-400 text-xs max-w-xs truncate" th:text="${o.itemsSummary}"></td>
          <td class="px-4 py-3 text-white" th:text="'Rs. ' + ${o.totalAmount}"></td>
          <td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs"
            th:classappend="${o.status == 'DELIVERED'} ? 'bg-green-500/20 text-green-400' : (${o.status == 'PENDING'} ? 'bg-yellow-500/20 text-yellow-400' : 'bg-blue-500/20 text-blue-400')"
            th:text="${o.status}"></span></td>
          <td class="px-4 py-3">
            <form th:action="@{/admin/orders/{id}/status(id=${o.id})}" method="post" class="flex gap-1">
              <select name="status" class="bg-slate-800 border border-slate-600 rounded-lg px-2 py-1 text-white text-xs focus:outline-none">
                <option th:each="s : ${ {'PENDING','CONFIRMED','PREPARING','DELIVERED','CANCELLED'} }" th:value="${s}" th:text="${s}" th:selected="${s == o.status}"></option>
              </select>
              <button class="bg-blue-500 hover:bg-blue-600 text-white px-2 py-1 rounded-lg text-xs transition">Set</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body></html>
