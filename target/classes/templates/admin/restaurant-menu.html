<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Restaurant Menu - Admin</title>
<script src="https://cdn.tailwindcss.com"></script><script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        slate: {
          300: '#A8A8A8',
          400: '#A8A8A8',
          600: 'rgba(255,255,255,0.08)',
          800: 'rgba(255,255,255,0.05)',
          900: '#1A1D23',
          950: '#0F1115'
        },
        blue: {
          400: '#C9A14A',
          500: '#C9A14A',
          600: '#A9863A',
          950: '#0F1115'
        },
        cyan: {
          300: '#C9A14A',
          400: '#C9A14A',
          950: '#0F1115'
        },
        white: '#F5F5F5'
      }
    }
  }
}
</script>
<style>
  .border-blue-500\/20, .border-slate-800, .border-slate-600, .border-b {
    border-color: rgba(255, 255, 255, 0.08) !important;
  }
  .bg-slate-900\/60, .bg-slate-900\/80 {
    background-color: #1A1D23 !important;
  }
  .bg-slate-800 {
    background-color: rgba(255, 255, 255, 0.05) !important;
  }
  select, select option {
    background-color: #1A1D23;
    color: #F5F5F5;
  }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-950 via-slate-950 to-cyan-950">
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="max-w-7xl mx-auto px-4 py-10">
  <div class="flex items-center gap-3 mb-2">
    <a href="/admin/restaurants" class="text-slate-400 hover:text-cyan-300 text-sm transition">Restaurants</a>
    <span class="text-slate-600">/</span>
    <span class="text-white text-sm" th:text="${restaurant.name}"></span>
    <span class="text-slate-600">/</span>
    <span class="text-slate-400 text-sm">Menu Items</span>
  </div>
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-3xl font-bold text-white" th:text="${restaurant.name} + ' - Menu'"></h1>
      <p class="text-slate-400 text-sm mt-1" th:text="${restaurant.cuisineType} + ' · ' + ${restaurant.address}"></p>
    </div>
    <a th:href="@{/admin/restaurants/{id}/menu/new(id=${restaurant.id})}" class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2.5 rounded-xl font-semibold transition text-sm">Add Item</a>
  </div>
  <div class="bg-slate-900/60 border border-blue-500/20 rounded-2xl overflow-hidden">
    <table class="w-full text-sm">
      <thead><tr class="border-b border-blue-500/20">
        <th class="text-left text-slate-400 px-4 py-3">Name</th>
        <th class="text-left text-slate-400 px-4 py-3">Category</th>
        <th class="text-left text-slate-400 px-4 py-3">Price</th>
        <th class="text-left text-slate-400 px-4 py-3">Available</th>
        <th class="text-left text-slate-400 px-4 py-3">Actions</th>
      </tr></thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(items)}">
          <td colspan="5" class="px-4 py-8 text-center text-slate-400">No menu items yet. Add the first item.</td>
        </tr>
        <tr th:each="i : ${items}" class="border-b border-slate-800 hover:bg-slate-800/30">
          <td class="px-4 py-3 text-white" th:text="${i.name}"></td>
          <td class="px-4 py-3 text-slate-300" th:text="${i.category}"></td>
          <td class="px-4 py-3 text-cyan-300 font-semibold" th:text="'Rs. ' + ${i.price}"></td>
          <td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs"
            th:classappend="${i.available} ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'"
            th:text="${i.available ? 'Yes' : 'No'}"></span></td>
          <td class="px-4 py-3 flex gap-2">
            <a th:href="@{/admin/restaurants/{rid}/menu/{iid}/edit(rid=${restaurant.id},iid=${i.id})}" class="text-cyan-400 hover:underline text-xs">Edit</a>
            <form th:action="@{/admin/restaurants/{rid}/menu/{iid}/delete(rid=${restaurant.id},iid=${i.id})}" method="post" class="inline">
              <button class="text-red-400 hover:underline text-xs">Delete</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body></html>
