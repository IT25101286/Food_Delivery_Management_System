<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Delivery Persons - Admin</title>
<script src="https://cdn.tailwindcss.com"></script><script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        slate: {
          300: '#A8A8A8',
          400: '#A8A8A8',
          600: 'rgba(255,255,255,0.08)',
          800: 'rgba(255,255,255,0.05)',
          900: '#1A1D23',
          950: '#0F1115'
        },
        blue: {
          400: '#C9A14A',
          500: '#C9A14A',
          600: '#A9863A',
          950: '#0F1115'
        },
        cyan: {
          300: '#C9A14A',
          400: '#C9A14A',
          950: '#0F1115'
        },
        white: '#F5F5F5'
      }
    }
  }
}
</script>
<style>
  .border-blue-500\/20, .border-slate-800, .border-slate-600, .border-b {
    border-color: rgba(255, 255, 255, 0.08) !important;
  }
  .bg-slate-900\/60, .bg-slate-900\/80 {
    background-color: #1A1D23 !important;
  }
  .bg-slate-800 {
    background-color: rgba(255, 255, 255, 0.05) !important;
  }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-950 via-slate-950 to-cyan-950">
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="max-w-5xl mx-auto px-4 py-10">
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold text-white">Delivery Persons</h1>
    <a href="/admin/delivery-persons/new" class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2.5 rounded-xl font-semibold transition text-sm">Add Person</a>
  </div>
  <div class="bg-slate-900/60 border border-blue-500/20 rounded-2xl overflow-hidden">
    <table class="w-full text-sm">
      <thead><tr class="border-b border-blue-500/20">
        <th class="text-left text-slate-400 px-4 py-3">Name</th>
        <th class="text-left text-slate-400 px-4 py-3">Phone</th>
        <th class="text-left text-slate-400 px-4 py-3">Available</th>
        <th class="text-left text-slate-400 px-4 py-3">Actions</th>
      </tr></thead>
      <tbody>
        <tr th:each="p : ${persons}" class="border-b border-slate-800 hover:bg-slate-800/30">
          <td class="px-4 py-3 text-white" th:text="${p.name}"></td>
          <td class="px-4 py-3 text-slate-300" th:text="${p.phone}"></td>
          <td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs"
            th:classappend="${p.available} ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'"
            th:text="${p.available ? 'Available' : 'Busy'}"></span></td>
          <td class="px-4 py-3 flex gap-2">
            <a th:href="@{/admin/delivery-persons/{id}/edit(id=${p.id})}" class="text-cyan-400 hover:underline text-xs">Edit</a>
            <form th:action="@{/admin/delivery-persons/{id}/delete(id=${p.id})}" method="post" class="inline">
              <button class="text-red-400 hover:underline text-xs">Delete</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body></html>
