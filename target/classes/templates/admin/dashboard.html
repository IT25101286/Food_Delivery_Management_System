<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Admin Dashboard - FoodDelivery</title>
<script src="https://cdn.tailwindcss.com"></script><script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        slate: {
          300: '#A8A8A8',
          400: '#A8A8A8',
          600: 'rgba(255,255,255,0.08)',
          800: 'rgba(255,255,255,0.05)',
          900: '#1A1D23',
          950: '#0F1115'
        },
        blue: {
          400: '#C9A14A',
          500: '#C9A14A',
          600: '#A9863A',
          950: '#0F1115'
        },
        cyan: {
          300: '#C9A14A',
          400: '#C9A14A',
          950: '#0F1115'
        },
        white: '#F5F5F5'
      }
    }
  }
}
</script>
<style>
  .border-blue-500\/20, .border-slate-800, .border-slate-600, .border-b {
    border-color: rgba(255, 255, 255, 0.08) !important;
  }
  .bg-slate-900\/60, .bg-slate-900\/80 {
    background-color: #1A1D23 !important;
  }
  .bg-slate-800 {
    background-color: rgba(255, 255, 255, 0.05) !important;
  }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-950 via-slate-950 to-cyan-950">
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="max-w-7xl mx-auto px-4 py-10">
  <h1 class="text-3xl font-bold text-white mb-8">Admin Dashboard</h1>
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
    <div class="bg-slate-900/60 border border-blue-500/20 rounded-2xl p-5 text-center">
      <p class="text-3xl font-bold text-white" th:text="${totalOrders}">0</p><p class="text-slate-400 text-sm mt-1">Total Orders</p>
    </div>
    <div class="bg-slate-900/60 border border-blue-500/20 rounded-2xl p-5 text-center">
      <p class="text-3xl font-bold text-yellow-400" th:text="${statusCounts['PENDING']}">0</p><p class="text-slate-400 text-sm mt-1">Pending</p>
    </div>
    <div class="bg-slate-900/60 border border-blue-500/20 rounded-2xl p-5 text-center">
      <p class="text-3xl font-bold text-cyan-300" th:text="${totalUsers}">0</p><p class="text-slate-400 text-sm mt-1">Users</p>
    </div>
    <div class="bg-slate-900/60 border border-blue-500/20 rounded-2xl p-5 text-center">
      <p class="text-3xl font-bold text-green-400" th:text="${totalRestaurants}">0</p><p class="text-slate-400 text-sm mt-1">Restaurants</p>
    </div>
  </div>
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-10">
    <a href="/admin/users" class="bg-slate-900/60 border border-blue-500/20 rounded-2xl p-4 text-center hover:border-blue-500/50 transition"><p class="text-white font-semibold text-sm">Users</p></a>
    <a href="/admin/restaurants" class="bg-slate-900/60 border border-blue-500/20 rounded-2xl p-4 text-center hover:border-blue-500/50 transition"><p class="text-white font-semibold text-sm">Restaurants</p></a>
    <a href="/admin/orders" class="bg-slate-900/60 border border-blue-500/20 rounded-2xl p-4 text-center hover:border-blue-500/50 transition"><p class="text-white font-semibold text-sm">Orders</p></a>
    <a href="/admin/payments" class="bg-slate-900/60 border border-blue-500/20 rounded-2xl p-4 text-center hover:border-blue-500/50 transition"><p class="text-white font-semibold text-sm">Payments</p></a>
    <a href="/admin/delivery-persons" class="bg-slate-900/60 border border-blue-500/20 rounded-2xl p-4 text-center hover:border-blue-500/50 transition"><p class="text-white font-semibold text-sm">Delivery Persons</p></a>
    <a href="/admin/delivery-orders" class="bg-slate-900/60 border border-blue-500/20 rounded-2xl p-4 text-center hover:border-blue-500/50 transition"><p class="text-white font-semibold text-sm">Delivery Orders</p></a>
  </div>
  <h2 class="text-xl font-bold text-white mb-4">Recent Orders</h2>
  <div class="bg-slate-900/60 border border-blue-500/20 rounded-2xl overflow-hidden">
    <table class="w-full text-sm">
      <thead><tr class="border-b border-blue-500/20">
        <th class="text-left text-slate-400 px-4 py-3">Ref</th>
        <th class="text-left text-slate-400 px-4 py-3">Customer</th>
        <th class="text-left text-slate-400 px-4 py-3">Amount</th>
        <th class="text-left text-slate-400 px-4 py-3">Status</th>
      </tr></thead>
      <tbody>
        <tr th:each="o : ${recentOrders}" class="border-b border-slate-800">
          <td class="px-4 py-3 text-cyan-300 font-mono" th:text="${o.orderRef}"></td>
          <td class="px-4 py-3 text-slate-300" th:text="${o.customerName}"></td>
          <td class="px-4 py-3 text-white" th:text="'Rs. ' + ${o.totalAmount}"></td>
          <td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs"
            th:classappend="${o.status == 'DELIVERED'} ? 'bg-green-500/20 text-green-400' : (${o.status == 'PENDING'} ? 'bg-yellow-500/20 text-yellow-400' : 'bg-blue-500/20 text-blue-400')"
            th:text="${o.status}"></span></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body></html>
