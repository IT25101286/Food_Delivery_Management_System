<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodDelivery Admin - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            100: '#F5F5F5',
                            300: '#A8A8A8',
                            400: '#A8A8A8',
                            500: '#A8A8A8',
                            600: '#1A1D23',
                            700: '#1A1D23',
                            800: '#1A1D23',
                            900: '#1A1D23',
                            950: '#0F1115'
                        },
                        blue: {
                            300: '#C9A14A',
                            400: '#C9A14A',
                            500: '#C9A14A',
                            600: '#b08d41',
                            950: '#0F1115'
                        },
                        cyan: {
                            200: '#C9A14A',
                            300: '#C9A14A',
                            400: '#C9A14A',
                            500: '#C9A14A',
                            950: '#0F1115'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .border-blue-500\/20,
        .border-blue-500\/30,
        .border-slate-800\/50,
        .border-blue-500\/40,
        .border-cyan-500\/40 {
            border-color: rgba(255, 255, 255, 0.08) !important;
        }
    </style>
</head>

<body
    class="min-h-screen bg-slate-950 bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 flex items-center justify-center relative overflow-hidden">

    <div class="absolute top-0 left-0 w-96 h-96 bg-blue-400/20 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-cyan-300/20 rounded-full blur-3xl pointer-events-none"></div>
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-blue-600/10 rounded-full blur-3xl pointer-events-none">
    </div>

    <div class="relative z-10 w-full max-w-md mx-4">
        <div class="bg-slate-900/60 border border-blue-500/20 rounded-2xl p-8 backdrop-blur-sm shadow-2xl">

            <div class="flex items-center justify-center mb-8">
                <div
                    class="w-12 h-12 bg-gradient-to-r from-blue-500 to-blue-600 rounded-xl flex items-center justify-center mr-3 shadow-lg shadow-blue-500/25">
                    <span class="text-white font-bold text-lg">FD</span>
                </div>
                <div>
                    <h1
                        class="text-xl font-bold bg-gradient-to-r from-blue-300 to-blue-600 bg-clip-text text-transparent">
                        FoodDelivery</h1>
                    <p class="text-slate-400 text-sm">Admin Management</p>
                </div>
            </div>

            <div th:if="${param.error}" class="bg-red-500/20 border border-red-500/30 rounded-lg p-3 mb-5 text-center">
                <p class="text-red-400 text-sm">Invalid email or password. Please try again.</p>
            </div>
            <div th:if="${param.logout}"
                class="bg-green-500/20 border border-green-500/30 rounded-lg p-3 mb-5 text-center">
                <p class="text-green-400 text-sm">You have been signed out successfully.</p>
            </div>

            <h2 class="text-slate-100 text-2xl font-semibold mb-6 text-center">Welcome Back</h2>

            <form th:action="@{/login}" method="post" class="space-y-4">
                <div>
                    <label class="text-slate-300 text-sm font-medium mb-2 block">Email Address</label>
                    <input type="email" name="username" required autocomplete="email" placeholder="superadmin@food.com"
                        class="w-full bg-slate-800 border border-blue-500/30 text-slate-100 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent placeholder-slate-500 transition-all">
                </div>
                <div>
                    <label class="text-slate-300 text-sm font-medium mb-2 block">Password</label>
                    <input type="password" name="password" required autocomplete="current-password"
                        placeholder="••••••••"
                        class="w-full bg-slate-800 border border-blue-500/30 text-slate-100 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent placeholder-slate-500 transition-all">
                </div>
                <button type="submit"
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 rounded-xl transition-colors duration-200 shadow-lg shadow-blue-500/25 mt-2">
                    Sign In
                </button>
            </form>

            <p class="text-slate-500 text-xs text-center mt-6">FoodDelivery Admin &copy; 2025</p>
        </div>
    </div>
</body>

</html>
