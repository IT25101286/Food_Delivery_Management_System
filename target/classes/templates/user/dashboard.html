<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Dashboard - FoodDelivery</title>
<script src="https://cdn.tailwindcss.com"></script><script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        slate: {
          300: '#A8A8A8',
          400: '#A8A8A8',
          600: 'rgba(255,255,255,0.08)',
          800: 'rgba(255,255,255,0.05)',
          900: '#1A1D23',
          950: '#0F1115'
        },
        blue: {
          400: '#C9A14A',
          500: '#C9A14A',
          600: '#A9863A',
          950: '#0F1115'
        },
        cyan: {
          300: '#C9A14A',
          400: '#C9A14A',
          950: '#0F1115'
        },
        white: '#F5F5F5'
      }
    }
  }
}
</script>
<style>
  .border-blue-500\/20, .border-slate-800, .border-slate-600, .border-b {
    border-color: rgba(255, 255, 255, 0.08) !important;
  }
  .bg-slate-900\/60, .bg-slate-900\/80 {
    background-color: #1A1D23 !important;
  }
  .bg-slate-800 {
    background-color: rgba(255, 255, 255, 0.05) !important;
  }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-950 via-slate-950 to-cyan-950">
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="max-w-7xl mx-auto px-4 py-10">
  <h1 class="text-3xl font-bold text-white mb-1">Welcome, <span class="text-cyan-300" th:text="${session.userName}"></span></h1>
  <p class="text-slate-400 mb-8">Your order summary</p>
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-10">
    <div class="bg-slate-900/60 border border-blue-500/20 rounded-2xl p-6 text-center">
      <p class="text-4xl font-bold text-white" th:text="${totalOrders}">0</p>
      <p class="text-slate-400 text-sm mt-1">Total Orders</p>
    </div>
    <div class="bg-slate-900/60 border border-blue-500/20 rounded-2xl p-6 text-center">
      <p class="text-4xl font-bold text-yellow-400" th:text="${pendingOrders}">0</p>
      <p class="text-slate-400 text-sm mt-1">Pending</p>
    </div>
    <div class="bg-slate-900/60 border border-blue-500/20 rounded-2xl p-6 text-center">
      <p class="text-4xl font-bold text-green-400" th:text="${deliveredOrders}">0</p>
      <p class="text-slate-400 text-sm mt-1">Delivered</p>
    </div>
  </div>
  <div class="flex gap-3 mb-8">
    <a href="/order/place" class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2.5 rounded-xl font-semibold transition text-sm">Place Order</a>
    <a href="/order/my-orders" class="border border-blue-500 text-blue-400 hover:bg-blue-500/10 px-5 py-2.5 rounded-xl text-sm transition">View All Orders</a>
    <a href="/payment/my-payments" class="border border-cyan-500 text-cyan-400 hover:bg-cyan-500/10 px-5 py-2.5 rounded-xl text-sm transition">My Payments</a>
  </div>
  <h2 class="text-xl font-bold text-white mb-4">Recent Orders</h2>
  <div class="bg-slate-900/60 border border-blue-500/20 rounded-2xl overflow-hidden">
    <table class="w-full text-sm">
      <thead><tr class="border-b border-blue-500/20">
        <th class="text-left text-slate-400 px-4 py-3">Ref</th>
        <th class="text-left text-slate-400 px-4 py-3">Items</th>
        <th class="text-left text-slate-400 px-4 py-3">Amount</th>
        <th class="text-left text-slate-400 px-4 py-3">Status</th>
        <th class="text-left text-slate-400 px-4 py-3">Action</th>
      </tr></thead>
      <tbody>
        <tr th:each="o : ${orders}" class="border-b border-slate-800 hover:bg-slate-800/30">
          <td class="px-4 py-3 text-cyan-300 font-mono" th:text="${o.orderRef}"></td>
          <td class="px-4 py-3 text-slate-300" th:text="${o.itemsSummary}"></td>
          <td class="px-4 py-3 text-white" th:text="'Rs. ' + ${o.totalAmount}"></td>
          <td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs"
            th:classappend="${o.status == 'DELIVERED'} ? 'bg-green-500/20 text-green-400' : (${o.status == 'PENDING'} ? 'bg-yellow-500/20 text-yellow-400' : 'bg-blue-500/20 text-blue-400')"
            th:text="${o.status}"></span></td>
          <td class="px-4 py-3">
            <a th:href="@{/track/{ref}(ref=${o.orderRef})}" class="text-cyan-400 hover:underline text-xs">Track</a>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(orders)}"><td colspan="5" class="px-4 py-8 text-center text-slate-500">No orders yet</td></tr>
      </tbody>
    </table>
  </div>
</div>
</body></html>
