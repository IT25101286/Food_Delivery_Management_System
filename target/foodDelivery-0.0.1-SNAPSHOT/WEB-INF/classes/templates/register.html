<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | FoodDelivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen antialiased">
    <div class="absolute inset-0 -z-10 bg-gradient-to-br from-blue-950 via-slate-950 to-cyan-950"></div>
    <div class="absolute -top-24 -right-24 h-80 w-80 rounded-full bg-blue-400/20 blur-3xl"></div>
    <div class="absolute -bottom-20 -left-20 h-80 w-80 rounded-full bg-cyan-300/20 blur-3xl"></div>

    <header class="max-w-7xl mx-auto px-6 py-6">
        <nav class="flex items-center justify-between rounded-2xl bg-slate-900/70 border border-blue-500/20 px-5 py-4 backdrop-blur shadow-xl shadow-blue-900/20">
            <div class="flex items-center gap-2">
                <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-r from-blue-500 to-cyan-400 text-white font-bold">FD</span>
                <span class="font-extrabold text-xl tracking-tight">FoodDelivery</span>
            </div>
            <div class="flex items-center gap-3">
                <a th:href="@{/}" class="px-4 py-2 rounded-lg text-sm font-semibold text-blue-200 hover:bg-blue-500/20 transition">Home</a>
                <a th:href="@{/login}" class="px-4 py-2 rounded-lg text-sm font-semibold bg-blue-500 text-white hover:bg-blue-600 transition">Login</a>
            </div>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="max-w-xl mx-auto rounded-3xl bg-slate-900/70 border border-blue-500/20 p-8 shadow-2xl shadow-blue-900/30">
            <h1 class="text-3xl font-black text-white text-center">Create Your Account</h1>
            <p class="text-center text-slate-300 mt-2">Join FoodDelivery and start ordering in seconds</p>

            <form th:action="@{/register}" th:object="${user}" method="post" class="mt-7 space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-200 mb-2">Name</label>
                    <input
                        type="text"
                        th:field="*{name}"
                        required
                        class="w-full rounded-xl bg-slate-950/70 border border-blue-500/30 px-4 py-3 text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400"
                        placeholder="Your full name">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-200 mb-2">Email</label>
                    <input
                        type="email"
                        th:field="*{email}"
                        required
                        class="w-full rounded-xl bg-slate-950/70 border border-blue-500/30 px-4 py-3 text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400"
                        placeholder="you@example.com">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-200 mb-2">Phone Number</label>
                    <input
                        type="text"
                        th:field="*{phone}"
                        class="w-full rounded-xl bg-slate-950/70 border border-blue-500/30 px-4 py-3 text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400"
                        placeholder="07X XXX XXXX">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-200 mb-2">Password</label>
                    <input
                        type="password"
                        th:field="*{password}"
                        required
                        minlength="6"
                        class="w-full rounded-xl bg-slate-950/70 border border-blue-500/30 px-4 py-3 text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400"
                        placeholder="At least 6 characters">
                </div>

                <button
                    type="submit"
                    class="w-full rounded-xl bg-blue-500 py-3 font-semibold text-white hover:bg-blue-600 transition shadow-lg shadow-blue-700/30">
                    Create Account
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-slate-300">
                Already have an account?
                <a th:href="@{/login}" class="text-cyan-300 hover:text-cyan-200 font-semibold">Log in</a>
            </p>
        </div>
    </main>
</body>
</html>
