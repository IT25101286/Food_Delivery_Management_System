<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Payment Submitted - FoodDelivery</title>
<script src="https://cdn.tailwindcss.com"></script><script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        slate: {
          300: '#A8A8A8',
          400: '#A8A8A8',
          600: 'rgba(255,255,255,0.08)',
          800: 'rgba(255,255,255,0.05)',
          900: '#1A1D23',
          950: '#0F1115'
        },
        blue: {
          400: '#C9A14A',
          500: '#C9A14A',
          600: '#A9863A',
          950: '#0F1115'
        },
        cyan: {
          300: '#C9A14A',
          400: '#C9A14A',
          950: '#0F1115'
        },
        white: '#F5F5F5'
      }
    }
  }
}
</script>
<style>
  .border-blue-500\/20, .border-slate-800, .border-slate-600, .border-b {
    border-color: rgba(255, 255, 255, 0.08) !important;
  }
  .bg-slate-900\/60, .bg-slate-900\/80 {
    background-color: #1A1D23 !important;
  }
  .bg-slate-800 {
    background-color: rgba(255, 255, 255, 0.05) !important;
  }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-950 via-slate-950 to-cyan-950">
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="max-w-lg mx-auto px-4 py-10 text-center">
  <div class="bg-slate-900/60 border border-yellow-500/30 rounded-2xl p-10">
    <div class="text-6xl mb-4">&#9203;</div>
    <h1 class="text-3xl font-bold mb-2" style="color:#fbbf24;">Payment Submitted</h1>
    <p class="mb-1" style="color:#A8A8A8;">Your payment is awaiting admin verification.</p>
    <p class="text-sm mb-6" style="color:#A8A8A8;">You will see the confirmed status once an admin approves it.</p>
    <div th:if="${payment != null}" class="text-left space-y-3 mb-8">
      <div class="flex justify-between"><span class="text-slate-400 text-sm">Payment Ref</span><span class="font-mono text-sm" style="color:#C9A14A;" th:text="${payment.paymentRef}"></span></div>
      <div class="flex justify-between"><span class="text-slate-400 text-sm">Amount</span><span class="font-bold" style="color:#F5F5F5;" th:text="'Rs. ' + ${payment.amount}"></span></div>
      <div class="flex justify-between"><span class="text-slate-400 text-sm">Method</span><span class="text-sm" style="color:#F5F5F5;" th:text="${payment.paymentMethod}"></span></div>
      <div class="flex justify-between"><span class="text-slate-400 text-sm">Order Ref</span><span class="font-mono text-sm" style="color:#C9A14A;" th:text="${payment.orderRef}"></span></div>
      <div class="flex justify-between"><span class="text-slate-400 text-sm">Status</span>
        <span class="px-2 py-0.5 rounded-full text-xs font-semibold" style="background-color:rgba(234,179,8,0.15);color:#fbbf24;">Wait for payment verify</span>
      </div>
    </div>
    <div class="flex gap-3 justify-center">
      <a href="/payment/my-payments" class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2.5 rounded-xl font-semibold transition text-sm">My Payments</a>
      <a href="/user/dashboard" class="border border-blue-500 text-blue-400 hover:bg-blue-500/10 px-5 py-2.5 rounded-xl text-sm transition">Dashboard</a>
    </div>
  </div>
</div>
</body></html>
