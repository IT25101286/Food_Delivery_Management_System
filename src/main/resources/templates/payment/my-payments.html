<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>My Payments - FoodDelivery</title>
<script src="https://cdn.tailwindcss.com"></script><script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        slate: { 300:'#A8A8A8', 400:'#A8A8A8', 600:'rgba(255,255,255,0.08)', 800:'rgba(255,255,255,0.05)', 900:'#1A1D23', 950:'#0F1115' },
        blue:  { 400:'#C9A14A', 500:'#C9A14A', 600:'#A9863A', 950:'#0F1115' },
        cyan:  { 300:'#C9A14A', 400:'#C9A14A', 950:'#0F1115' },
        white: '#F5F5F5'
      }
    }
  }
}
</script>
<style>
  .border-blue-500\/20,.border-slate-800,.border-slate-600,.border-b { border-color:rgba(255,255,255,0.08)!important; }
  .bg-slate-900\/60,.bg-slate-900\/80 { background-color:#1A1D23!important; }
  .bg-slate-800 { background-color:rgba(255,255,255,0.05)!important; }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-950 via-slate-950 to-cyan-950">
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="max-w-5xl mx-auto px-4 py-10">
  <h1 class="text-3xl font-bold mb-8" style="color:#F5F5F5;">My Orders &amp; Payments</h1>
  <div class="space-y-4">
    <div th:each="o : ${orders}" class="rounded-2xl p-5"
         style="background-color:#1A1D23;border:1px solid rgba(255,255,255,0.08);">
      <div class="flex justify-between items-start mb-2">
        <span class="font-mono font-bold" style="color:#C9A14A;" th:text="${o.orderRef}"></span>
        <span class="px-3 py-1 rounded-full text-xs font-semibold"
          th:style="${o.status == 'DELIVERED'}  ? 'background-color:rgba(34,197,94,0.15);color:#4ade80;'
                  : (${o.status == 'CONFIRMED'} ? 'background-color:rgba(34,197,94,0.15);color:#4ade80;'
                  : (${o.status == 'PENDING'}   ? 'background-color:rgba(234,179,8,0.15);color:#fbbf24;'
                  : (${o.status == 'CANCELLED'} ? 'background-color:rgba(239,68,68,0.15);color:#f87171;'
                  : 'background-color:rgba(201,161,74,0.15);color:#C9A14A;')))"
          th:text="${o.status}"></span>
      </div>
      <p class="text-sm mb-1" style="color:#A8A8A8;" th:text="${o.itemsSummary}"></p>
      <div class="flex justify-between items-center mt-2 mb-3">
        <span class="font-bold" style="color:#F5F5F5;" th:text="'Rs. ' + ${o.totalAmount}"></span>
        <!-- Show Pay Now only when no payment (PENDING or COMPLETED) exists for this order -->
        <a th:if="${o.status == 'PENDING' and (paymentsMap[o.id] == null or (paymentsMap[o.id].?[status == 'PENDING'].size() == 0 and paymentsMap[o.id].?[status == 'COMPLETED'].size() == 0))}"
           th:href="@{/payment/pay(orderId=${o.id})}"
           class="px-4 py-1.5 rounded-xl text-xs font-semibold transition"
           style="background-color:#C9A14A;color:#0F1115;">Pay Now</a>
        <!-- Awaiting verification badge -->
        <span th:if="${paymentsMap[o.id] != null and paymentsMap[o.id].?[status == 'PENDING'].size() > 0}"
              class="px-3 py-1 rounded-full text-xs font-semibold"
              style="background-color:rgba(234,179,8,0.15);color:#fbbf24;">&#9203; Wait for payment verify</span>
        <!-- Confirmed badge -->
        <span th:if="${paymentsMap[o.id] != null and paymentsMap[o.id].?[status == 'COMPLETED'].size() > 0}"
              class="px-3 py-1 rounded-full text-xs font-semibold"
              style="background-color:rgba(34,197,94,0.15);color:#4ade80;">&#10003; CONFIRMED</span>
      </div>

      <!-- Payment records -->
      <div th:if="${paymentsMap[o.id] != null and not #lists.isEmpty(paymentsMap[o.id])}">
        <p class="text-xs uppercase tracking-wide mb-2" style="color:#A8A8A8;">Payment Records</p>
        <div class="rounded-xl overflow-hidden" style="background-color:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);">
          <table class="w-full text-xs">
            <thead>
              <tr style="border-bottom:1px solid rgba(255,255,255,0.08);">
                <th class="text-left px-3 py-2" style="color:#A8A8A8;">Ref</th>
                <th class="text-left px-3 py-2" style="color:#A8A8A8;">Method</th>
                <th class="text-left px-3 py-2" style="color:#A8A8A8;">Amount</th>
                <th class="text-left px-3 py-2" style="color:#A8A8A8;">Status</th>
                <th class="text-left px-3 py-2" style="color:#A8A8A8;">Action</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="p : ${paymentsMap[o.id]}" style="border-bottom:1px solid rgba(255,255,255,0.05);">
                <td class="px-3 py-2 font-mono" style="color:#C9A14A;" th:text="${p.paymentRef}"></td>
                <td class="px-3 py-2" style="color:#A8A8A8;" th:text="${p.paymentMethod}"></td>
                <td class="px-3 py-2 font-semibold" style="color:#F5F5F5;" th:text="'Rs. ' + ${p.amount}"></td>
                <td class="px-3 py-2">
                  <span class="px-2 py-0.5 rounded-full text-xs"
                    th:style="${p.status == 'COMPLETED'} ? 'background-color:rgba(34,197,94,0.15);color:#4ade80;'
                             : (${p.status == 'PENDING'}  ? 'background-color:rgba(234,179,8,0.15);color:#fbbf24;'
                             : 'background-color:rgba(239,68,68,0.15);color:#f87171;')"
                    th:text="${p.status == 'PENDING'} ? 'Wait for payment verify' : (${p.status == 'COMPLETED'} ? 'CONFIRMED' : ${p.status})"></span>
                </td>
                <td class="px-3 py-2">
                  <form th:if="${p.status != 'COMPLETED'}"
                        th:action="@{/payment/{id}/delete(id=${p.id})}" method="post"
                        onsubmit="return confirm('Delete this payment record?')">
                    <button class="text-xs font-medium transition"
                            style="color:#f87171;" onmouseover="this.style.textDecoration='underline'"
                            onmouseout="this.style.textDecoration='none'">Delete</button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-16" style="color:#A8A8A8;">No orders found.</div>
  </div>
</div>
</body></html>
