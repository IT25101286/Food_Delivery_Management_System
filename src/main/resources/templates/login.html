<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Food Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0F1115] text-[#F5F5F5]">

<!-- Navigation -->
<nav class="bg-[#1A1D23] border-b border-[rgba(255,255,255,0.08)]">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-r from-[#C9A14A] to-[#C9A14A] rounded-lg flex items-center justify-center">
                    <span class="text-lg font-bold">🍽️</span>
                </div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-[#C9A14A] to-[#C9A14A] bg-clip-text text-transparent">FoodHub</h1>
            </div>
            <a href="/restaurants" class="text-[#C9A14A] hover:text-[#C9A14A] font-semibold">Back to Restaurants</a>
        </div>
    </div>
</nav>

<!-- Login Container -->
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md">
        <div class="bg-[#1A1D23] border border-[rgba(255,255,255,0.08)] rounded-xl shadow-2xl shadow-cyan-500/10 p-8">
            <!-- Header -->
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold bg-gradient-to-r from-[#C9A14A] to-[#C9A14A] bg-clip-text text-transparent mb-2">Admin Portal</h2>
                <p class="text-[#A8A8A8]">Restaurant Management System</p>
            </div>

            <!-- Error Message -->
            <div th:if="${error}" class="mb-6 p-4 bg-red-500/20 border border-[rgba(255,255,255,0.08)] rounded-lg">
                <p class="text-red-400 text-sm" th:text="${error}"></p>
            </div>

            <!-- Login Form -->
            <form th:action="@{/login}" method="post" class="space-y-5">
                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-semibold text-[#A8A8A8] mb-2">Email Address</label>
                    <input type="email" id="email" name="email" required
                           class="w-full px-4 py-3 bg-white/5 border border-[rgba(255,255,255,0.08)] rounded-lg text-[#F5F5F5] placeholder-gray-500 focus:outline-none focus:border-[rgba(255,255,255,0.08)] focus:ring-1 focus:ring-cyan-500/50 transition"
                           placeholder="admin@food.com">
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-semibold text-[#A8A8A8] mb-2">Password</label>
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-3 bg-white/5 border border-[rgba(255,255,255,0.08)] rounded-lg text-[#F5F5F5] placeholder-gray-500 focus:outline-none focus:border-[rgba(255,255,255,0.08)] focus:ring-1 focus:ring-cyan-500/50 transition"
                           placeholder="••••••••">
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full mt-6 bg-gradient-to-r from-[#C9A14A] to-[#C9A14A] hover:from-[#C9A14A] hover:to-[#C9A14A] text-[#F5F5F5] font-bold py-3 rounded-lg transition-all duration-300 transform hover:scale-105 active:scale-95">
                    Sign In
                </button>
            </form>

            <!-- Demo Credentials -->
            <div class="mt-8 p-4 bg-[#C9A14A]/10 border border-[rgba(255,255,255,0.08)] rounded-lg">
                <p class="text-xs text-[#A8A8A8] mb-2"><strong>Demo Credentials:</strong></p>
                <p class="text-xs text-[#C9A14A]">Email: <code class="bg-[#0F1115] px-2 py-1 rounded">admin@food.com</code></p>
                <p class="text-xs text-[#C9A14A]">Password: <code class="bg-[#0F1115] px-2 py-1 rounded">admin123</code></p>
            </div>
        </div>

        <!-- Footer Link -->
        <div class="text-center mt-6 text-[#A8A8A8] text-sm">
            <p>Customers? <a href="/restaurants" class="text-[#C9A14A] hover:text-[#C9A14A] font-semibold">Browse Restaurants</a></p>
        </div>
    </div>
</div>

</body>
</html>
