<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Management - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-primary-bg: #0F1115;
            --color-secondary-bg: #1A1D23;
            --color-accent: #C9A14A;
            --color-text-primary: #F5F5F5;
            --color-text-secondary: #A8A8A8;
        }
        body { background-color: var(--color-primary-bg); color: var(--color-text-primary); }
        .card-bg { background-color: var(--color-secondary-bg); }
        .accent-text { color: var(--color-accent); }
        .accent-border { border-color: var(--color-accent); }
        .secondary-text { color: var(--color-text-secondary); }
        input, select { background-color: var(--color-primary-bg) !important; border-color: rgba(201, 161, 74, 0.2) !important; }
        input:focus, select:focus { border-color: var(--color-accent) !important; box-shadow: 0 0 0 3px rgba(201, 161, 74, 0.1) !important; }
    </style>
</head>
<body class="min-h-screen text-slate-100" style="background-color: #0F1115;">
<div class="relative overflow-hidden">
    <div class="absolute -top-24 -left-32 h-80 w-80 rounded-full blur-3xl" style="background-color: rgba(201, 161, 74, 0.15);"></div>
    <div class="absolute bottom-0 right-0 h-72 w-72 rounded-full blur-3xl" style="background-color: rgba(201, 161, 74, 0.1);"></div>

    <div class="relative mx-auto flex min-h-screen max-w-7xl items-center justify-center px-6 py-12">
        <div class="w-full max-w-md rounded-2xl border-2 p-8 shadow-2xl backdrop-blur" style="background-color: #1A1D23; border-color: rgba(201, 161, 74, 0.3);">
            <h1 class="text-3xl font-black tracking-tight" style="color: #C9A14A;">Payment Management</h1>
            <p class="mt-2 text-sm" style="color: #A8A8A8;">Online Food Delivery System</p>

            <div th:if="${error}" class="mt-5 rounded-lg border px-4 py-3 text-sm" style="border-color: rgba(239, 68, 68, 0.3); background-color: rgba(239, 68, 68, 0.1); color: #FF6B6B;" th:text="${error}"></div>

            <form method="post" action="/login" class="mt-6 space-y-4">
                <div>
                    <label class="mb-1 block text-sm" style="color: #A8A8A8;">Email</label>
                    <input type="email" name="email" required class="w-full rounded-lg px-4 py-2.5 outline-none transition" style="background-color: #0F1115; border: 1px solid rgba(201, 161, 74, 0.2); color: #F5F5F5;" placeholder="you@food.com">
                </div>
                <div>
                    <label class="mb-1 block text-sm" style="color: #A8A8A8;">Password</label>
                    <input type="password" name="password" required class="w-full rounded-lg px-4 py-2.5 outline-none transition" style="background-color: #0F1115; border: 1px solid rgba(201, 161, 74, 0.2); color: #F5F5F5;" placeholder="********">
                </div>
                <button type="submit" class="w-full rounded-lg px-4 py-2.5 font-semibold text-white transition hover:opacity-90" style="background: linear-gradient(to right, #C9A14A, #B8911F);">Login</button>
            </form>

            <div class="mt-6 space-y-2 rounded-lg p-4 text-xs" style="border: 1px solid rgba(201, 161, 74, 0.15); background-color: rgba(201, 161, 74, 0.05); color: #A8A8A8;">
                <p><span class="font-semibold" style="color: #C9A14A;">Admin:</span> admin@food.com / admin123</p>
                <p><span class="font-semibold" style="color: #C9A14A;">Customer:</span> user@food.com / user123</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
