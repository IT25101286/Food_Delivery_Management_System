<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FoodDelivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0F1115] text-[#F5F5F5] min-h-screen antialiased">
    <div class="absolute inset-0 -z-10 bg-gradient-to-br from-[#0F1115] via-[#15181E] to-[#1A1D23]"></div>
    <div class="absolute -top-24 -right-24 h-80 w-80 rounded-full bg-[#C9A14A]/14 blur-3xl"></div>
    <div class="absolute -bottom-20 -left-20 h-80 w-80 rounded-full bg-[#C9A14A]/10 blur-3xl"></div>

    <header class="max-w-7xl mx-auto px-6 py-6">
        <nav class="flex items-center justify-between rounded-2xl bg-[#1A1D23]/95 border border-[rgba(255,255,255,0.08)] px-5 py-4 backdrop-blur shadow-xl shadow-black/35">
            <div class="flex items-center gap-2">
                <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-r from-[#C9A14A] to-[#D4B167] text-[#F5F5F5] font-bold">FD</span>
                <span class="font-extrabold text-xl tracking-tight">FoodDelivery</span>
            </div>
            <div class="flex items-center gap-3">
                <a th:href="@{/}" class="px-4 py-2 rounded-lg text-sm font-semibold text-[#C9A14A] hover:bg-[#C9A14A]/20 transition">Home</a>
                <a th:href="@{/register}" class="px-4 py-2 rounded-lg text-sm font-semibold bg-[#C9A14A] text-[#F5F5F5] hover:bg-[#B89240] transition">Create Account</a>
            </div>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="max-w-md mx-auto rounded-3xl bg-[#1A1D23]/95 border border-[rgba(255,255,255,0.08)] p-8 shadow-2xl shadow-black/45">
            <h1 class="text-3xl font-black text-[#F5F5F5] text-center">Welcome Back</h1>
            <p class="text-center text-[#A8A8A8] mt-2">Sign in to continue your food journey</p>

            <div th:if="${param.error}" class="mt-5 rounded-xl bg-red-500/15 border border-red-400/30 text-red-200 px-4 py-3 text-sm">
                Invalid email or password.
            </div>
            <div th:if="${param.logout}" class="mt-5 rounded-xl bg-[#C9A14A]/15 border border-[rgba(255,255,255,0.08)] text-[#C9A14A] px-4 py-3 text-sm">
                You have been logged out successfully.
            </div>
            <div th:if="${param.updated}" class="mt-5 rounded-xl bg-[#C9A14A]/15 border border-[rgba(255,255,255,0.08)] text-[#C9A14A] px-4 py-3 text-sm">
                Profile updated successfully. Please log in again.
            </div>
            <div th:if="${param.deleted}" class="mt-5 rounded-xl bg-[#C9A14A]/15 border border-[rgba(255,255,255,0.08)] text-[#C9A14A] px-4 py-3 text-sm">
                Your account has been deleted.
            </div>

            <form th:action="@{/login}" method="post" class="mt-6 space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-[#F5F5F5] mb-2">Email</label>
                    <input
                        type="email"
                        name="username"
                        required
                        class="w-full rounded-xl bg-[#0F1115]/70 border border-[rgba(255,255,255,0.08)] px-4 py-3 text-[#F5F5F5] placeholder-[#A8A8A8] focus:outline-none focus:ring-2 focus:ring-[#C9A14A] focus:border-[#C9A14A]"
                        placeholder="you@example.com">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-[#F5F5F5] mb-2">Password</label>
                    <input
                        type="password"
                        name="password"
                        required
                        class="w-full rounded-xl bg-[#0F1115]/70 border border-[rgba(255,255,255,0.08)] px-4 py-3 text-[#F5F5F5] placeholder-[#A8A8A8] focus:outline-none focus:ring-2 focus:ring-[#C9A14A] focus:border-[#C9A14A]"
                        placeholder="••••••••">
                </div>

                <button
                    type="submit"
                    class="w-full rounded-xl bg-[#C9A14A] py-3 font-semibold text-[#F5F5F5] hover:bg-[#B89240] transition shadow-lg shadow-black/35">
                    Log In
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-[#A8A8A8]">
                Don't have an account?
                <a th:href="@{/register}" class="text-[#C9A14A] hover:text-[#C9A14A] font-semibold">Register now</a>
            </p>
        </div>
    </main>
</body>
</html>
