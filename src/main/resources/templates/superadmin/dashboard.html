<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Super Admin Dashboard - FoodDelivery</title>
<script src="https://cdn.tailwindcss.com"></script><script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        slate: { 300: '#A8A8A8', 400: '#A8A8A8', 600: 'rgba(255,255,255,0.08)', 800: 'rgba(255,255,255,0.05)', 900: '#1A1D23', 950: '#0F1115' },
        blue: { 400: '#C9A14A', 500: '#C9A14A', 600: '#A9863A', 950: '#0F1115' },
        cyan: { 300: '#C9A14A', 400: '#C9A14A', 950: '#0F1115' },
        white: '#F5F5F5'
      }
    }
  }
}
</script>
<style>
  .border-blue-500\/20, .border-slate-800, .border-slate-600, .border-b { border-color: rgba(255,255,255,0.08) !important; }
  .bg-slate-900\/60, .bg-slate-900\/80 { background-color: #1A1D23 !important; }
  .bg-slate-800 { background-color: rgba(255,255,255,0.05) !important; }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-950 via-slate-950 to-cyan-950">
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="max-w-5xl mx-auto px-4 py-10">
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-3xl font-bold text-white">Super Admin Dashboard</h1>
      <p class="text-slate-400 text-sm mt-1">Manage system administrators</p>
    </div>
    <a href="/superadmin/admins/new"
       class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-semibold transition">
      + Add Admin
    </a>
  </div>

  <div class="bg-slate-900/60 border border-blue-500/20 rounded-2xl overflow-hidden">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-blue-500/20">
          <th class="text-left text-slate-400 px-4 py-3">Name</th>
          <th class="text-left text-slate-400 px-4 py-3">Email</th>
          <th class="text-left text-slate-400 px-4 py-3">Phone</th>
          <th class="text-left text-slate-400 px-4 py-3">Role</th>
          <th class="text-left text-slate-400 px-4 py-3">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="a : ${admins}" class="border-b border-slate-800">
          <td class="px-4 py-3 text-white" th:text="${a.name}"></td>
          <td class="px-4 py-3 text-slate-300" th:text="${a.email}"></td>
          <td class="px-4 py-3 text-slate-400" th:text="${a.phone ?: '-'}"></td>
          <td class="px-4 py-3">
            <span class="px-2 py-1 rounded-full text-xs"
              th:classappend="${a.adminRole == 'SUPER_ADMIN'} ? 'bg-yellow-500/20 text-yellow-400' : 'bg-blue-500/20 text-blue-400'"
              th:text="${a.adminRole}"></span>
          </td>
          <td class="px-4 py-3 flex gap-2">
            <a th:href="@{'/superadmin/admins/' + ${a.id} + '/edit'}"
               class="bg-blue-500/20 hover:bg-blue-500/40 text-blue-400 px-3 py-1 rounded-lg text-xs transition">Edit</a>
            <form th:action="@{'/superadmin/admins/' + ${a.id} + '/delete'}" method="post"
                  th:if="${a.id != session.userId and a.email != 'admin@food.com' and a.email != 'superadmin@food.com'}"
                  onsubmit="return confirm('Delete this admin?')">
              <button type="submit"
                      class="bg-red-500/20 hover:bg-red-500/40 text-red-400 px-3 py-1 rounded-lg text-xs transition">Delete</button>
            </form>
            <span th:if="${a.email == 'admin@food.com' or a.email == 'superadmin@food.com'}"
                  class="text-xs px-2 py-1 rounded-lg"
                  style="color:rgba(168,168,168,0.4);background-color:rgba(255,255,255,0.03);">Protected</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body></html>
