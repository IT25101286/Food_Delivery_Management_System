<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>My Orders - FoodDelivery</title>
<script src="https://cdn.tailwindcss.com"></script><script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        slate: { 300:'#A8A8A8', 400:'#A8A8A8', 600:'rgba(255,255,255,0.08)', 800:'rgba(255,255,255,0.05)', 900:'#1A1D23', 950:'#0F1115' },
        blue:  { 400:'#C9A14A', 500:'#C9A14A', 600:'#A9863A', 950:'#0F1115' },
        cyan:  { 300:'#C9A14A', 400:'#C9A14A', 950:'#0F1115' },
        white: '#F5F5F5'
      }
    }
  }
}
</script>
<style>
  .border-blue-500\/20,.border-slate-800,.border-slate-600,.border-b { border-color:rgba(255,255,255,0.08)!important; }
  .bg-slate-900\/60,.bg-slate-900\/80 { background-color:#1A1D23!important; }
  .bg-slate-800 { background-color:rgba(255,255,255,0.05)!important; }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-950 via-slate-950 to-cyan-950">
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="max-w-5xl mx-auto px-4 py-10">
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-3xl font-bold" style="color:#F5F5F5;">My Orders</h1>
    <a href="/restaurants" class="px-5 py-2.5 rounded-xl font-semibold transition text-sm"
       style="background-color:#C9A14A;color:#0F1115;">New Order</a>
  </div>
  <div class="space-y-4">
    <div th:each="o : ${orders}" class="rounded-2xl p-5"
         style="background-color:#1A1D23;border:1px solid rgba(255,255,255,0.08);">
      <div class="flex items-start justify-between mb-3">
        <div>
          <span class="font-mono font-bold" style="color:#C9A14A;" th:text="${o.orderRef}"></span>
          <p class="text-xs mt-0.5" style="color:#A8A8A8;" th:text="${o.createdAt}"></p>
        </div>
        <!-- Status badge -->
        <span class="px-3 py-1 rounded-full text-xs font-semibold"
          th:style="${o.status == 'DELIVERED'}  ? 'background-color:rgba(34,197,94,0.15);color:#4ade80;'
                  : (${o.status == 'CONFIRMED'} ? 'background-color:rgba(34,197,94,0.15);color:#4ade80;'
                  : (${o.status == 'PENDING'}   ? 'background-color:rgba(234,179,8,0.15);color:#fbbf24;'
                  : (${o.status == 'CANCELLED'} ? 'background-color:rgba(239,68,68,0.15);color:#f87171;'
                  : 'background-color:rgba(201,161,74,0.15);color:#C9A14A;')))"
          th:text="${o.status}"></span>
      </div>
      <p class="text-sm mb-1" style="color:#A8A8A8;" th:text="${o.itemsSummary}"></p>
      <p class="text-xs mb-4" style="color:rgba(168,168,168,0.6);" th:text="${o.deliveryAddress}"></p>
      <div class="flex items-center justify-between">
        <span class="font-bold" style="color:#F5F5F5;" th:text="'Rs. ' + ${o.totalAmount}"></span>
        <div class="flex gap-2 flex-wrap">

          <!-- Track -->
          <a th:href="@{/track/{ref}(ref=${o.orderRef})}"
             class="inline-flex items-center px-3 py-1.5 rounded-lg text-xs font-medium transition"
             style="background-color:rgba(201,161,74,0.12);color:#C9A14A;border:1px solid rgba(201,161,74,0.2);">
            Track
          </a>

          <!-- Edit (PENDING only) -->
          <a th:if="${o.status == 'PENDING'}" th:href="@{/order/{id}/edit(id=${o.id})}"
             class="inline-flex items-center px-3 py-1.5 rounded-lg text-xs font-medium transition"
             style="background-color:rgba(234,179,8,0.12);color:#fbbf24;border:1px solid rgba(234,179,8,0.2);">
            Edit
          </a>

          <!-- Pay (PENDING only) -->
          <a th:if="${o.status == 'PENDING'}" th:href="@{/payment/pay(orderId=${o.id})}"
             class="inline-flex items-center px-3 py-1.5 rounded-lg text-xs font-medium transition"
             style="background-color:rgba(201,161,74,0.2);color:#C9A14A;border:1px solid rgba(201,161,74,0.3);">
            Pay
          </a>

          <!-- Cancel (PENDING only) → sets status CANCELLED -->
          <form th:if="${o.status == 'PENDING'}" th:action="@{/order/{id}/cancel(id=${o.id})}" method="post" class="inline">
            <button type="submit"
                    class="inline-flex items-center px-3 py-1.5 rounded-lg text-xs font-medium transition"
                    style="background-color:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2);">
              Cancel
            </button>
          </form>

          <!-- Delete (CANCELLED only) → hard delete from DB -->
          <form th:if="${o.status == 'CANCELLED'}" th:action="@{/order/{id}/delete(id=${o.id})}" method="post" class="inline"
                onsubmit="return confirm('Permanently delete this order?')">
            <button type="submit"
                    class="inline-flex items-center px-3 py-1.5 rounded-lg text-xs font-medium transition"
                    style="background-color:rgba(239,68,68,0.7);color:#fff;border:1px solid rgba(239,68,68,0.8);">
              Delete
            </button>
          </form>

        </div>
      </div>
    </div>
    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-16" style="color:#A8A8A8;">
      No orders yet. <a href="/order/place" style="color:#C9A14A;" class="hover:underline">Place your first order</a>
    </div>
  </div>
</div>
</body></html>
