<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Restaurants - FoodDelivery</title>
<script src="https://cdn.tailwindcss.com"></script><script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        slate: {
          300: '#A8A8A8',
          400: '#A8A8A8',
          600: 'rgba(255,255,255,0.08)',
          800: 'rgba(255,255,255,0.05)',
          900: '#1A1D23',
          950: '#0F1115'
        },
        blue: {
          400: '#C9A14A',
          500: '#C9A14A',
          600: '#A9863A',
          950: '#0F1115'
        },
        cyan: {
          300: '#C9A14A',
          400: '#C9A14A',
          950: '#0F1115'
        },
        white: '#F5F5F5'
      }
    }
  }
}
</script>
<style>
  .border-blue-500\/20, .border-slate-800, .border-slate-600, .border-b {
    border-color: rgba(255, 255, 255, 0.08) !important;
  }
  .bg-slate-900\/60, .bg-slate-900\/80 {
    background-color: #1A1D23 !important;
  }
  .bg-slate-800 {
    background-color: rgba(255, 255, 255, 0.05) !important;
  }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-950 via-slate-950 to-cyan-950">
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="max-w-7xl mx-auto px-4 py-10">
  <h1 class="text-3xl font-bold text-white mb-2">Open Restaurants</h1>
  <p class="text-slate-400 mb-8">Browse and order from our partner restaurants</p>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div th:each="r : ${restaurants}" class="bg-slate-900/60 border border-blue-500/20 rounded-2xl p-6 hover:border-blue-500/50 transition">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-white font-bold text-lg" th:text="${r.name}"></h2>
        <span class="bg-green-500/20 text-green-400 text-xs px-2 py-1 rounded-full">OPEN</span>
      </div>
      <p class="text-cyan-300 text-sm mb-1" th:text="${r.cuisineType}"></p>
      <p class="text-slate-500 text-xs mb-1" th:text="${r.address}"></p>
      <p class="text-slate-500 text-xs mb-4" th:text="${r.openingTime + ' - ' + r.closingTime}"></p>
      <a th:href="@{/restaurants/{id}/menu(id=${r.id})}" class="block text-center bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-xl text-sm font-semibold transition">View Menu</a>
    </div>
  </div>
  <div th:if="${#lists.isEmpty(restaurants)}" class="text-center text-slate-400 mt-16">No open restaurants right now.</div>
</div>
</body></html>
