<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Restaurants | Food Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0F1115] text-[#F5F5F5]">

<!-- Navigation -->
<nav class="bg-[#1A1D23] border-b border-[rgba(255,255,255,0.08)]">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-r from-[#C9A14A] to-[#C9A14A] rounded-lg flex items-center justify-center">
                    <span class="text-lg font-bold">🍽️</span>
                </div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-[#C9A14A] to-[#C9A14A] bg-clip-text text-transparent">FoodHub</h1>
            </div>
            <div class="flex gap-4">
                <a href="/restaurants" class="text-[#C9A14A] hover:text-[#C9A14A] font-semibold">Browse</a>
                <a href="/login" class="bg-gradient-to-r from-[#C9A14A] to-[#C9A14A] px-4 py-2 rounded-lg hover:from-[#C9A14A] hover:to-[#C9A14A] font-semibold">Admin Login</a>
            </div>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<div class="bg-gradient-to-b from-[#1A1D23] to-[#0F1115] border-b border-[rgba(255,255,255,0.08)] py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <h2 class="text-4xl font-bold mb-2">Discover Restaurants</h2>
        <p class="text-[#C9A14A] text-lg">Browse all open restaurants and explore different cuisines</p>
    </div>
</div>

<!-- Main Content -->
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div th:if="${restaurants.isEmpty()}" class="text-center py-12">
        <p class="text-xl text-[#C9A14A]">No open restaurants available at the moment</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" th:if="${!restaurants.isEmpty()}">
        <div th:each="restaurant : ${restaurants}" class="bg-[#1A1D23] border border-[rgba(255,255,255,0.08)] rounded-lg overflow-hidden hover:border-[#C9A14A] transition-all duration-300 hover:shadow-lg hover:shadow-[#C9A14A]/20">
            <!-- Header -->
            <div class="bg-gradient-to-r from-[#C9A14A]/20 to-[#C9A14A]/20 p-4 border-b border-[rgba(255,255,255,0.08)]">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="text-xl font-bold text-[#F5F5F5]" th:text="${restaurant.name}"></h3>
                        <p class="text-[#C9A14A] text-sm mt-1" th:text="${restaurant.ownerName}"></p>
                    </div>
                    <span class="bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-xs font-semibold border border-[rgba(255,255,255,0.08)]" th:text="${restaurant.status}"></span>
                </div>
            </div>

            <!-- Content -->
            <div class="p-4 space-y-3">
                <div class="flex items-start gap-2">
                    <span class="text-[#C9A14A]">📍</span>
                    <p class="text-sm text-[#A8A8A8]" th:text="${restaurant.address}"></p>
                </div>

                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2">
                        <span class="text-[#C9A14A]">📞</span>
                        <p class="text-sm text-[#A8A8A8]" th:text="${restaurant.phone}"></p>
                    </div>
                </div>

                <div class="flex items-center justify-between pt-2 border-t border-[rgba(255,255,255,0.08)]">
                    <div class="flex gap-2">
                        <span class="text-[#C9A14A] font-semibold">🍴</span>
                        <span class="text-sm bg-[#C9A14A]/20 text-[#C9A14A] px-3 py-1 rounded-full border border-[rgba(255,255,255,0.08)]" th:text="${restaurant.cuisineType}"></span>
                    </div>
                </div>

                <div class="flex items-center gap-4 pt-2 text-xs text-[#A8A8A8]">
                    <div class="flex items-center gap-1">
                        <span>🕐</span>
                        <span th:text="${restaurant.openingTime}"></span>
                    </div>
                    <div class="flex items-center gap-1">
                        <span>🕑</span>
                        <span th:text="${restaurant.closingTime}"></span>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="bg-[#0F1115] border-t border-[rgba(255,255,255,0.08)] p-4">
                <button class="w-full bg-gradient-to-r from-[#C9A14A] to-[#C9A14A] hover:from-[#C9A14A] hover:to-[#C9A14A] text-[#F5F5F5] font-semibold py-2 rounded-lg transition-all duration-300">
                    View Menu
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-[#1A1D23] border-t border-[rgba(255,255,255,0.08)] mt-12 py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-[#A8A8A8]">
        <p>&copy; 2026 FoodHub Restaurant Management System. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
