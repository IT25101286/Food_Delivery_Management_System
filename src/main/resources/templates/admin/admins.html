<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admins - FoodDelivery Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            100: '#F5F5F5',
                            300: '#A8A8A8',
                            400: '#A8A8A8',
                            500: '#A8A8A8',
                            600: '#1A1D23',
                            700: '#1A1D23',
                            800: '#1A1D23',
                            900: '#1A1D23',
                            950: '#0F1115'
                        },
                        blue: {
                            300: '#C9A14A',
                            400: '#C9A14A',
                            500: '#C9A14A',
                            600: '#b08d41',
                            950: '#0F1115'
                        },
                        cyan: {
                            200: '#C9A14A',
                            300: '#C9A14A',
                            400: '#C9A14A',
                            500: '#C9A14A',
                            950: '#0F1115'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .border-blue-500\/20,
        .border-blue-500\/30,
        .border-slate-800\/50,
        .border-blue-500\/40,
        .border-cyan-500\/40 {
            border-color: rgba(255, 255, 255, 0.08) !important;
        }
    </style>
</head>

<body class="min-h-screen bg-slate-950 bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 p-4 sm:p-6 relative">

    <div class="absolute top-0 left-0 w-96 h-96 bg-blue-400/20 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-cyan-300/20 rounded-full blur-3xl pointer-events-none"></div>

    <div class="relative z-10 max-w-7xl mx-auto">

        <div th:replace="~{fragments/nav :: nav}"></div>

        <div th:if="${success}" class="bg-green-500/20 border border-green-500/30 rounded-xl p-4 mb-5 flex items-center gap-3">
            <span class="text-green-400 text-lg">&#10003;</span>
            <p class="text-green-300 text-sm" th:text="${success}"></p>
        </div>
        <div th:if="${error}" class="bg-red-500/20 border border-red-500/30 rounded-xl p-4 mb-5 flex items-center gap-3">
            <span class="text-red-400 text-lg">&#9888;</span>
            <p class="text-red-300 text-sm" th:text="${error}"></p>
        </div>

        <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
            <div>
                <h1 class="text-2xl font-bold text-slate-100">Admin Management</h1>
                <p class="text-slate-400 text-sm mt-0.5">Manage all administrator accounts</p>
            </div>
            <a th:href="@{/admin/admins/new}"
               class="bg-blue-500 hover:bg-blue-600 text-white font-medium px-5 py-2.5 rounded-xl transition-colors shadow-lg shadow-blue-500/20 text-sm">
                + Add New Admin
            </a>
        </div>

        <div class="bg-slate-900/60 border border-blue-500/20 rounded-2xl p-4 mb-4">
            <form th:action="@{/admin/admins}" method="get" class="flex gap-3 flex-wrap">
                <input type="text" name="query" th:value="${query}"
                       placeholder="Search by name or email..."
                       class="flex-1 min-w-48 bg-slate-800 border border-blue-500/30 text-slate-100 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent placeholder-slate-500 transition-all">
                <select name="role"
                        class="bg-slate-800 border border-blue-500/30 text-slate-100 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    <option value="">All Roles</option>
                    <option th:each="role : ${roles}"
                            th:value="${role}"
                            th:text="${role}"
                            th:selected="${role == selectedRole}"></option>
                </select>
                <button type="submit"
                        class="bg-blue-500 hover:bg-blue-600 text-white text-sm font-medium px-5 py-2.5 rounded-xl transition-colors">
                    Search
                </button>
                <a th:href="@{/admin/admins}"
                   class="bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm font-medium px-4 py-2.5 rounded-xl transition-colors">
                    Clear
                </a>
            </form>
        </div>

        <div class="bg-slate-900/60 border border-blue-500/20 rounded-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="bg-slate-800/50 text-left text-slate-400 text-xs uppercase tracking-wider">
                            <th class="px-5 py-4">#</th>
                            <th class="px-5 py-4">Name</th>
                            <th class="px-5 py-4">Email</th>
                            <th class="px-5 py-4">Phone</th>
                            <th class="px-5 py-4">Role</th>
                            <th class="px-5 py-4">Status</th>
                            <th class="px-5 py-4">Last Login</th>
                            <th class="px-5 py-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="admin, stat : ${admins}"
                            th:classappend="${stat.odd} ? 'bg-slate-900/10' : 'bg-slate-800/10'"
                            class="border-t border-slate-800/50 hover:bg-slate-800/40 transition-colors">
                            <td class="px-5 py-4 text-slate-500 text-sm" th:text="${stat.count}"></td>
                            <td class="px-5 py-4">
                                <span class="text-slate-100 font-medium text-sm" th:text="${admin.name}"></span>
                            </td>
                            <td class="px-5 py-4 text-slate-300 text-sm" th:text="${admin.email}"></td>
                            <td class="px-5 py-4 text-slate-400 text-sm" th:text="${admin.phone != null and !admin.phone.isEmpty() ? admin.phone : '—'}"></td>
                            <td class="px-5 py-4">
                                <span class="px-2.5 py-1 rounded-lg text-xs font-semibold"
                                      th:classappend="${admin.adminRole.name() == 'SUPER_ADMIN'} ? 'bg-blue-500/20 text-blue-300' : (${admin.adminRole.name() == 'ADMIN'} ? 'bg-cyan-500/20 text-cyan-300' : 'bg-slate-600/50 text-slate-300')"
                                      th:text="${admin.adminRole}"></span>
                            </td>
                            <td class="px-5 py-4">
                                <span th:if="${admin.active}"
                                      class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg text-xs font-medium bg-green-500/20 text-green-300">
                                    <span class="w-1.5 h-1.5 bg-green-400 rounded-full"></span> Active
                                </span>
                                <span th:unless="${admin.active}"
                                      class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg text-xs font-medium bg-red-500/20 text-red-300">
                                    <span class="w-1.5 h-1.5 bg-red-400 rounded-full"></span> Inactive
                                </span>
                            </td>
                            <td class="px-5 py-4 text-slate-400 text-xs"
                                th:text="${admin.lastLoginAt != null ? #temporals.format(admin.lastLoginAt, 'dd MMM yyyy HH:mm') : 'Never'}"></td>
                            <td class="px-5 py-4">
                                <div class="flex gap-2 justify-end">
                                    <a th:href="@{/admin/admins/{id}/edit(id=${admin.id})}"
                                       class="bg-blue-500/20 hover:bg-blue-500/40 border border-blue-500/30 text-blue-300 text-xs font-medium px-3 py-1.5 rounded-lg transition-colors">
                                        Edit
                                    </a>
                                    <form th:action="@{/admin/admins/{id}/delete(id=${admin.id})}"
                                          method="post" class="inline"
                                          onsubmit="return confirm('Delete admin? This action cannot be undone.')">
                                        <button type="submit"
                                                class="bg-red-500/20 hover:bg-red-500/40 border border-red-500/30 text-red-300 text-xs font-medium px-3 py-1.5 rounded-lg transition-colors">
                                            Delete
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(admins)}">
                            <td colspan="8" class="px-6 py-14 text-center">
                                <p class="text-slate-400 text-sm">No admins found matching your search.</p>
                                <a th:href="@{/admin/admins}" class="text-cyan-300 hover:text-cyan-200 text-sm mt-1 inline-block transition-colors">Clear filters</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${!#lists.isEmpty(admins)}" class="px-5 py-3 border-t border-slate-800/50 bg-slate-800/20">
                <p class="text-slate-500 text-xs" th:text="'Showing ' + ${#lists.size(admins)} + ' admin(s)'"></p>
            </div>
        </div>
    </div>
</body>
</html>
