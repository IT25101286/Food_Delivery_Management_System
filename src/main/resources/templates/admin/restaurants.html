<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Restaurants | Food Delivery Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0F1115] text-[#F5F5F5]">

<!-- Navigation -->
<nav class="bg-[#1A1D23] border-b border-[rgba(255,255,255,0.08)]">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-gradient-to-r from-[#C9A14A] to-[#C9A14A] rounded-lg flex items-center justify-center">
                        <span class="text-lg font-bold">🍽️</span>
                    </div>
                    <h1 class="text-2xl font-bold bg-gradient-to-r from-[#C9A14A] to-[#C9A14A] bg-clip-text text-transparent">FoodHub</h1>
                </div>
                <span class="text-[#A8A8A8]">|</span>
                <span class="text-[#C9A14A] font-semibold">Admin</span>
            </div>
            <div class="flex gap-4">
                <a href="/logout" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg font-semibold transition">Logout</a>
            </div>
        </div>
    </div>
</nav>

<!-- Sidebar -->
<div class="flex min-h-screen">
    <aside class="w-64 bg-[#1A1D23] border-r border-[rgba(255,255,255,0.08)] p-6">
        <nav class="space-y-2">
            <a href="/admin/dashboard" class="block px-4 py-3 rounded-lg text-[#A8A8A8] hover:text-[#C9A14A] hover:bg-white/5 transition">
                📊 Dashboard
            </a>
            <a href="/admin/restaurants" class="block px-4 py-3 rounded-lg bg-[#C9A14A]/20 text-[#C9A14A] border border-[rgba(255,255,255,0.08)] font-semibold">
                🏪 Manage Restaurants
            </a>
            <a href="/restaurants" class="block px-4 py-3 rounded-lg text-[#A8A8A8] hover:text-[#C9A14A] hover:bg-white/5 transition">
                👀 View Public Listing
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1">
        <div class="max-w-7xl mx-auto px-6 py-12">
            <!-- Header -->
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-4xl font-bold mb-2">Manage Restaurants</h2>
                    <p class="text-[#A8A8A8]">CRUD operations for restaurant listings</p>
                </div>
                <a href="/admin/restaurants/new" class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-[#F5F5F5] font-bold py-3 px-6 rounded-lg transition-all duration-300 transform hover:scale-105 active:scale-95 flex items-center gap-2">
                    <span>➕</span>
                    <span>New Restaurant</span>
                </a>
            </div>

            <!-- Restaurants Table -->
            <div class="bg-[#1A1D23] border border-[rgba(255,255,255,0.08)] rounded-xl overflow-hidden">
                <div th:if="${restaurants.isEmpty()}" class="p-8 text-center">
                    <p class="text-xl text-[#C9A14A] mb-4">No restaurants found</p>
                    <a href="/admin/restaurants/new" class="inline-block bg-gradient-to-r from-[#C9A14A] to-[#C9A14A] hover:from-[#C9A14A] hover:to-[#C9A14A] text-[#F5F5F5] font-bold py-2 px-6 rounded-lg transition">
                        Add First Restaurant
                    </a>
                </div>

                <table class="w-full text-sm" th:if="${!restaurants.isEmpty()}">
                    <thead>
                        <tr class="border-b border-[rgba(255,255,255,0.08)] bg-[#0F1115]">
                            <th class="px-6 py-4 text-left font-semibold text-[#C9A14A]">Restaurant Name</th>
                            <th class="px-6 py-4 text-left font-semibold text-[#C9A14A]">Owner</th>
                            <th class="px-6 py-4 text-left font-semibold text-[#C9A14A]">Cuisine</th>
                            <th class="px-6 py-4 text-left font-semibold text-[#C9A14A]">Status</th>
                            <th class="px-6 py-4 text-left font-semibold text-[#C9A14A]">Contact</th>
                            <th class="px-6 py-4 text-center font-semibold text-[#C9A14A]">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="restaurant : ${restaurants}" class="border-b border-[rgba(255,255,255,0.08)] hover:bg-white/5/50 transition">
                            <td class="px-6 py-4">
                                <div class="font-semibold" th:text="${restaurant.name}"></div>
                                <div class="text-xs text-[#A8A8A8] mt-1" th:text="${restaurant.address}"></div>
                            </td>
                            <td class="px-6 py-4" th:text="${restaurant.ownerName}"></td>
                            <td class="px-6 py-4">
                                <span class="bg-[#C9A14A]/20 text-[#C9A14A] px-3 py-1 rounded-full text-xs border border-[rgba(255,255,255,0.08)]" th:text="${restaurant.cuisineType}"></span>
                            </td>
                            <td class="px-6 py-4">
                                <span th:if="${restaurant.status == 'OPEN'}" class="bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-xs border border-[rgba(255,255,255,0.08)]">✓ OPEN</span>
                                <span th:if="${restaurant.status == 'CLOSED'}" class="bg-gray-500/20 text-[#A8A8A8] px-3 py-1 rounded-full text-xs border border-gray-500/30">⊘ CLOSED</span>
                                <span th:if="${restaurant.status == 'SUSPENDED'}" class="bg-yellow-500/20 text-yellow-400 px-3 py-1 rounded-full text-xs border border-[rgba(255,255,255,0.08)]">⏸ SUSPENDED</span>
                            </td>
                            <td class="px-6 py-4 text-xs text-[#A8A8A8]" th:text="${restaurant.phone}"></td>
                            <td class="px-6 py-4">
                                <div class="flex gap-2 justify-center">
                                    <a th:href="@{/admin/restaurants/{id}/edit(id=${restaurant.id})}" class="bg-[#C9A14A]/20 hover:bg-blue-500/30 text-[#C9A14A] px-3 py-1 rounded border border-[rgba(255,255,255,0.08)] text-xs font-semibold transition">
                                        Edit
                                    </a>
                                    <form th:action="@{/admin/restaurants/{id}/toggle(id=${restaurant.id})}" method="post" class="inline">
                                        <button type="submit" class="bg-[#C9A14A]/20 hover:bg-cyan-500/30 text-[#C9A14A] px-3 py-1 rounded border border-[rgba(255,255,255,0.08)] text-xs font-semibold transition">
                                            Toggle
                                        </button>
                                    </form>
                                    <a th:href="@{/admin/restaurants/{id}/delete(id=${restaurant.id})}" class="bg-red-500/20 hover:bg-red-500/30 text-red-400 px-3 py-1 rounded border border-[rgba(255,255,255,0.08)] text-xs font-semibold transition" onclick="return confirm('Delete this restaurant?')">
                                        Delete
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

</body>
</html>
