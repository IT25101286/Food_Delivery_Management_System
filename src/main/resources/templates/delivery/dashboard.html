<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Deliveries - Premium Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        premium: {
                            bg: '#0F1115',
                            surface: '#1A1D23',
                            accent: '#C9A14A',
                            text: '#F5F5F5',
                            muted: '#A8A8A8',
                            border: 'rgba(255,255,255,0.08)'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-premium-bg min-h-screen text-premium-text relative overflow-x-hidden focus:outline-none">
    <div
        class="fixed top-0 left-0 w-full h-[600px] bg-gradient-to-b from-premium-accent/5 to-transparent -z-10 pointer-events-none">
    </div>
    <div
        class="fixed -bottom-[300px] -right-[300px] w-[800px] h-[800px] bg-premium-accent/5 rounded-full blur-[150px] -z-10 pointer-events-none">
    </div>

    <!-- Navigation -->
    <div th:replace="fragments/nav :: nav"></div>

    <main class="max-w-7xl mx-auto px-4 py-12 relative z-10">
        <!-- Page Header -->
        <div
            class="mb-12 pb-6 border-b border-premium-border/50 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-4xl font-bold text-premium-text tracking-tight mb-2">My <span
                        class="text-premium-accent">Deliveries</span></h1>
                <p class="text-premium-muted tracking-wide">Assigned orders for <span th:text="${deliveryPerson.name}"
                        class="text-premium-accent font-semibold">Name</span></p>
            </div>
            <div
                class="text-sm bg-premium-surface border border-premium-border px-4 py-2 rounded-full text-premium-muted flex items-center gap-2">
                <div class="w-2 h-2 rounded-full"
                    th:classappend="${deliveryPerson.available ? 'bg-emerald-500 animate-pulse' : 'bg-red-500'}"></div>
                <span th:text="${deliveryPerson.available ? 'Active & Ready' : 'Currently Offline'}">Status</span>
            </div>
        </div>

        <!-- Status Overview -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div
                class="bg-premium-surface border border-premium-border rounded-3xl p-8 shadow-xl relative overflow-hidden group">
                <div
                    class="absolute inset-0 bg-gradient-to-br from-emerald-500/5 to-transparent opacity-0 group-hover:opacity-100 transition duration-300">
                </div>
                <p class="text-premium-muted text-xs font-semibold uppercase tracking-widest mb-3">Status</p>
                <div class="flex items-center gap-3">
                    <div th:if="${deliveryPerson.available}"
                        class="w-3 h-3 bg-emerald-500 rounded-full shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
                    <div th:unless="${deliveryPerson.available}" class="w-3 h-3 bg-red-500 rounded-full"></div>
                    <span class="text-2xl font-bold text-premium-text tracking-wide"
                        th:text="${deliveryPerson.available ? 'Available' : 'Unavailable'}">Status</span>
                </div>
            </div>

            <div
                class="bg-premium-surface border border-premium-border rounded-3xl p-8 shadow-xl relative overflow-hidden group">
                <div
                    class="absolute inset-0 bg-gradient-to-br from-premium-accent/5 to-transparent opacity-0 group-hover:opacity-100 transition duration-300">
                </div>
                <p class="text-premium-muted text-xs font-semibold uppercase tracking-widest mb-3">Vehicle</p>
                <p class="text-2xl font-bold text-premium-text tracking-wide" th:text="${deliveryPerson.vehicleNumber}">
                    LK-ABC-1234</p>
            </div>

            <div
                class="bg-premium-surface border border-premium-border rounded-3xl p-8 shadow-xl relative overflow-hidden group">
                <div
                    class="absolute inset-0 bg-gradient-to-br from-premium-accent/5 to-transparent opacity-0 group-hover:opacity-100 transition duration-300">
                </div>
                <p class="text-premium-muted text-xs font-semibold uppercase tracking-widest mb-3">Contact</p>
                <p class="text-2xl font-bold text-premium-text tracking-wide" th:text="${deliveryPerson.phone}">
                    077-1234567</p>
            </div>
        </div>

        <!-- Assigned Orders -->
        <div class="bg-premium-surface border border-premium-border rounded-3xl p-10 shadow-2xl">
            <h2 class="text-2xl font-bold text-premium-text mb-8 tracking-wide border-b border-premium-border/50 pb-6">
                Active Assignments</h2>

            <div th:if="${#lists.isEmpty(assignedOrders)}" class="text-center py-16">
                <div
                    class="w-24 h-24 bg-[#0F1115] rounded-full mx-auto flex items-center justify-center border border-premium-border/50 mb-6">
                    <span class="text-4xl opacity-50">📦</span>
                </div>
                <p class="text-premium-text text-xl font-semibold mb-2">No active assignments</p>
                <p class="text-premium-muted">Standby for incoming delivery requests.</p>
            </div>

            <div th:unless="${#lists.isEmpty(assignedOrders)}" class="space-y-6">
                <div th:each="order : ${assignedOrders}"
                    class="bg-[#0F1115] border border-premium-border rounded-2xl p-8 hover:border-premium-accent/50 transition duration-300 relative group">
                    <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-8">
                        <div class="flex-1">
                            <div class="flex items-center gap-4 mb-6 pb-4 border-b border-premium-border/30">
                                <span class="text-2xl font-bold text-premium-text tracking-widest"
                                    th:text="${order.orderRef}">FD-2045</span>
                                <span
                                    class="inline-block rounded-full px-4 py-1 text-xs font-bold uppercase tracking-widest bg-premium-accent/10 border border-premium-accent/20"
                                    th:classappend="${order.status.name() == 'DELIVERED' ? 'text-emerald-400 bg-emerald-400/10 border-emerald-400/20' : 'text-premium-accent'}"
                                    th:text="${order.status.displayName}">Status</span>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
                                <div>
                                    <span
                                        class="block text-premium-muted text-xs font-semibold uppercase tracking-widest mb-1">Customer</span>
                                    <p class="text-premium-text font-medium text-lg" th:text="${order.customerName}">
                                        Name</p>
                                </div>
                                <div>
                                    <span
                                        class="block text-premium-muted text-xs font-semibold uppercase tracking-widest mb-1">Establishment</span>
                                    <p class="text-premium-text font-medium text-lg" th:text="${order.restaurantName}">
                                        Restaurant</p>
                                </div>
                                <div class="md:col-span-2">
                                    <span
                                        class="block text-premium-muted text-xs font-semibold uppercase tracking-widest mb-1">Destination</span>
                                    <p class="text-premium-text font-medium text-lg" th:text="${order.deliveryAddress}">
                                        Address</p>
                                </div>
                            </div>
                        </div>

                        <!-- Status Update -->
                        <div th:if="${order.status.name() != 'DELIVERED' && order.status.name() != 'CANCELLED'}"
                            class="lg:w-64 shrink-0 bg-premium-surface p-6 rounded-xl border border-premium-border/50">
                            <p class="text-xs font-semibold text-premium-muted uppercase tracking-widest mb-4">Update
                                Progress</p>
                            <form method="post" th:action="@{/delivery/orders/{id}/status(id=${order.id})}"
                                class="flex flex-col gap-3">
                                <select name="status"
                                    class="w-full bg-premium-bg border border-premium-border text-premium-text rounded-lg px-4 py-3 text-sm appearance-none focus:outline-none focus:border-premium-accent focus:ring-1 focus:ring-premium-accent transition shadow-inner font-medium">
                                    <option th:if="${order.status.name() == 'ASSIGNED'}" value="PICKED_UP" selected>Picked Up</option>
                                    <option th:if="${order.status.name() == 'PICKED_UP'}" value="ON_THE_WAY" selected>Out for Delivery</option>
                                    <option th:if="${order.status.name() == 'ON_THE_WAY'}" value="DELIVERED" selected>Delivered</option>
                                </select>
                                <button type="submit"
                                    class="w-full bg-premium-accent hover:bg-yellow-600 text-[#0F1115] text-sm font-bold py-3 rounded-lg transition duration-300 tracking-wider uppercase shadow hover:shadow-premium-accent/20">
                                    Confirm
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
